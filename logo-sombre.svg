<svg width="400" height="240" viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg">

  <!-- Fond -->
  <rect x="0" y="0" width="400" height="240" rx="16" fill="#0F0F0F"/>

  <!-- Bande orange gauche -->
  <rect x="0" y="0" width="8" height="240" rx="4" fill="#F97316"/>

  <!-- Bande orange top subtile -->
  <rect x="0" y="0" width="400" height="3" rx="1.5" fill="#F97316" opacity="0.4"/>

  <!-- Route pointillée -->
  <line x1="30" y1="170" x2="370" y2="170" stroke="#F97316" stroke-width="2" stroke-dasharray="12,8" opacity="0.3"/>

  <!-- REMORQUE -->
  <rect x="30" y="90" width="175" height="70" rx="5" fill="#1C1C1E"/>
  <rect x="30" y="90" width="175" height="70" rx="5" fill="none" stroke="#F97316" stroke-width="1.5"/>
  <!-- Lignes cargo -->
  <line x1="88"  y1="90" x2="88"  y2="160" stroke="#F97316" stroke-width="1" opacity="0.3"/>
  <line x1="146" y1="90" x2="146" y2="160" stroke="#F97316" stroke-width="1" opacity="0.3"/>

  <!-- CABINE -->
  <path d="M205,118 L205,160 L308,160 L308,108 L268,90 L205,90 Z" fill="#F97316"/>
  <!-- Fenêtre cabine -->
  <path d="M215,98 L215,138 L295,138 L295,110 L265,96 Z" fill="#0F0F0F" opacity="0.85"/>
  <!-- Reflet fenêtre -->
  <line x1="220" y1="98" x2="220" y2="137" stroke="#ffffff" stroke-width="1.5" opacity="0.12"/>
  <line x1="228" y1="97" x2="228" y2="137" stroke="#ffffff" stroke-width="0.8" opacity="0.07"/>

  <!-- Pare-choc -->
  <rect x="304" y="142" width="14" height="18" rx="3" fill="#1C1C1E" stroke="#F97316" stroke-width="1"/>

  <!-- Phare -->
  <circle cx="312" cy="120" r="6" fill="#FFF8E0" opacity="0.95"/>
  <circle cx="312" cy="120" r="3.5" fill="#FFFFFF"/>
  <!-- Halo -->
  <ellipse cx="328" cy="120" rx="12" ry="6" fill="#FFF" opacity="0.05"/>

  <!-- Détail grille -->
  <rect x="305" y="130" width="14" height="8" rx="1" fill="#1C1C1E" stroke="#F97316" stroke-width="0.8" opacity="0.6"/>

  <!-- Attelage -->
  <rect x="202" y="152" width="7" height="8" rx="1.5" fill="#8E8E93"/>

  <!-- ROUES remorque -->
  <circle cx="60"  cy="170" r="14" fill="#0F0F0F" stroke="#F97316" stroke-width="2"/>
  <circle cx="60"  cy="170" r="7"  fill="#1C1C1E"/>
  <circle cx="60"  cy="170" r="3.5" fill="#F97316" opacity="0.7"/>

  <circle cx="110" cy="170" r="14" fill="#0F0F0F" stroke="#F97316" stroke-width="2"/>
  <circle cx="110" cy="170" r="7"  fill="#1C1C1E"/>
  <circle cx="110" cy="170" r="3.5" fill="#F97316" opacity="0.7"/>

  <!-- ROUES cabine -->
  <circle cx="238" cy="170" r="14" fill="#0F0F0F" stroke="#F97316" stroke-width="2"/>
  <circle cx="238" cy="170" r="7"  fill="#1C1C1E"/>
  <circle cx="238" cy="170" r="3.5" fill="#F97316" opacity="0.7"/>

  <circle cx="288" cy="170" r="14" fill="#0F0F0F" stroke="#F97316" stroke-width="2"/>
  <circle cx="288" cy="170" r="7"  fill="#1C1C1E"/>
  <circle cx="288" cy="170" r="3.5" fill="#F97316" opacity="0.7"/>

  <!-- TEXTE -->
  <text x="30" y="212"
    font-family="'Arial Narrow', 'Arial', sans-serif"
    font-size="38" font-weight="900"
    fill="#FFFFFF" letter-spacing="6">AICHA</text>

  <text x="33" y="228"
    font-family="'Arial', sans-serif"
    font-size="13" font-weight="700"
    fill="#F97316" letter-spacing="9">LOGISTIQUE</text>

  <!-- Point décoratif -->
  <circle cx="375" cy="210" r="3" fill="#F97316" opacity="0.5"/>
  <circle cx="375" cy="220" r="2" fill="#F97316" opacity="0.3"/>

</svg>
